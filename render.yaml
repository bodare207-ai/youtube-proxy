services:
  - type: web
    name: youtube-proxy
    runtime: python
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn proxy_server:app --worker-class sync --workers 1
    envVars:
      - key: FLASK_APP
        value: proxy_server.py
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PYTHONUNBUFFERED
        value: "true"
      - key: YT_DLP_EXTRACTOR_HTTP_HEADERS
        value: '{"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"}'
      - key: YT_DLP_DEFAULT_HEADERS
        value: '{"Accept": "application/json, text/plain, */*", "Accept-Language": "en-US,en;q=0.9", "Accept-Encoding": "gzip, deflate, br"}'
      - key: REQUEST_TIMEOUT
        value: "30"
      - key: MAX_VIDEO_SIZE_MB
        value: "500"
      - key: CACHE_DURATION_SECONDS
        value: "3600"
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: LOG_LEVEL
        value: "INFO"
    healthCheckPath: /health
    autoDeploy: true
    buildFilter:
      paths:
        - proxy_server.py
        - requirements.txt
        - render.yaml
    scaling:
      minInstances: 0
      maxInstances: 1
    webService:
      port: 5000
      # Optional: Add custom domain
      # domains:
      #   - "youtube-proxy.example.com"
